name: Desplegar a Producción Laragon

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
      - name: Obtener código
        uses: actions/checkout@v4
      
      # Eliminamos el paso de bash que causaba error
      
      - name: Desplegar a Laragon (Windows CMD)
        shell: cmd
        run: |
          echo ========================================
          echo DESPLEGANDO A PRODUCCION LARAGON
          echo ========================================
          echo Origen: %GITHUB_WORKSPACE%
          echo Destino: C:\laragon\www\CarePharm
          echo.
          
          :: Crear carpeta si no existe
          if not exist "C:\laragon\www\CarePharm" mkdir "C:\laragon\www\CarePharm"
          
          :: Copiar archivos (excluyendo .git y .github)
          robocopy "%GITHUB_WORKSPACE%" "C:\laragon\www\CarePharm" /MIR /XD .git .github /XF *.md
          
          :: Verificar resultado
          if %errorlevel% geq 8 (
            echo [ERROR] Fallo en la copia de archivos
            exit /b 1
          ) else (
            echo [OK] Archivos copiados exitosamente
          )
          
          echo.
          echo ========================================
          echo ARCHIVOS DESPLEGADOS:
          dir "C:\laragon\www\CarePharm" /b
          echo ========================================
          echo ¡Despliegue completado con exito!