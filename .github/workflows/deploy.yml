# .github/workflows/deploy.yml
name: Desplegar PHP a Laragon

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
      - name: Obtener código
        uses: actions/checkout@v4
      
      - name: Configurar entorno Windows
        shell: bash
        run: |
          echo "MSYS_NO_PATHCONV=1" >> $GITHUB_ENV
      
      - name: Desplegar a Laragon (PHP)
        shell: cmd
        run: |
          set LARAGON_WWW=C:\laragon\www
          set PROYECTO=CarePharm
          
          echo "=== INICIANDO DESPLIEGUE PHP ==="
          echo "Origen: %GITHUB_WORKSPACE%"
          echo "Destino: %LARAGON_WWW%\%PROYECTO%"
          
          :: Crear carpeta si no existe
          if not exist "%LARAGON_WWW%\%PROYECTO%" mkdir "%LARAGON_WWW%\%PROYECTO%"
          
          :: Copiar archivos PHP al www de Laragon
          robocopy "%GITHUB_WORKSPACE%" "%LARAGON_WWW%\%PROYECTO%" /MIR /XD .git .github /XF *.md deploy.yml
          
          if %errorlevel% geq 8 (
            echo [ERROR] Fallo en la copia
            exit /b 1
          ) else (
            echo [OK] Archivos copiados exitosamente
          )
          
          echo.
          echo "=== Archivos desplegados ==="
          dir "%LARAGON_WWW%\%PROYECTO%" /b
      
      - name: Limpiar cache de PHP (si aplica)
        shell: cmd
        run: |
          :: Si usas OpCache, reiniciar PHP
          echo "Laragon PHP: Si hay cambios en configuracion, reinicia Laragon manualmente"
      
      - name: Despliegue completado
        shell: powershell
        run: |
          Write-Host "✅ Despliegue completado" -ForegroundColor Green
          Write-Host "🌐 Accede a tu proyecto en: http://locslhost/Carepharm" -ForegroundColor Cyan